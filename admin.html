<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タピオカ注文 管理画面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ログイン画面 -->
  <div class="container" id="login-container" style="text-align:center; padding-top:100px;">
    <h2 style="margin-bottom:20px;">管理者ログイン</h2>
    <button class="btn" id="btn-login" style="background-color:#4285F4;">Googleログイン</button>
  </div>

  <div class="container" id="admin-container" style="display: none;">
    <div class="admin-header">
      <h2>注文管理</h2>
      <button class="btn" id="btn-logout" style="background-color:#555; padding: 10px; font-size: 1rem; margin-top: 10px;">ログアウト</button>
    </div>

    <!-- 読み込み中 -->
    <div id="loading" class="loading hidden">読み込み中...</div>

    <!-- 注文一覧 -->
    <div class="admin-list" id="admin-list">
      <!-- 注文データがここに追加される -->
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
