<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理画面 - 収益</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ログイン画面は共通で使用されるのでここでも保持 -->
  <div id="login-screen" class="container" style="padding-top: 100px;">
    <h2 style="text-align:center;margin-bottom:20px;color:var(--primary-color);">管理画面へ</h2>
    <div style="background-color: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.95rem; text-align: left;">
      <p style="font-weight: bold; margin-bottom: 5px;">⚠️ 管理者のみが閲覧可能です</p>
    </div>
    <p style="text-align:center;margin-bottom:20px;font-size:1.1rem;color:#555;font-weight:bold;">パスワードを入力してください</p>
    <div class="form-group">
      <input type="email" id="admin-email" placeholder="メールアドレス" />
    </div>
    <div class="form-group">
      <input type="password" id="admin-password" placeholder="パスワード" />
      <div class="error-msg" id="admin-password-error">認証に失敗しました</div>
    </div>
    <button class="btn" id="btn-admin-login">管理画面へ</button>
  </div>

  <div id="admin-app" class="hidden">
    <div class="tabs">
      <button class="tab-btn active" id="tab-revenue-admin">収益</button>
      <button class="tab-btn" id="tab-orders-admin">注文一覧</button>
      <button class="tab-btn" id="tab-inventory-admin">在庫管理</button>
    </div>
    <div class="container" style="max-width: 1200px;">
      <div id="view-revenue-admin" class="hidden" style="max-width: 600px; margin: 0 auto;">
        <h2>収益</h2>
        <p>合計金額: <span id="revenue-amount">0</span>円</p>
      </div>
      <div id="view-orders-admin" class="hidden">
        <h2>注文一覧</h2>
        <div id="orders-list" class="admin-list"></div>
      </div>
      <div id="view-inventory-admin" class="hidden" style="max-width: 600px; margin: 0 auto;">
        <h2>在庫管理</h2>
        <p style="font-size: 1.3rem; margin-bottom: 12px;">現在在庫: <span id="stock-display" style="font-weight: bold; color: var(--primary-color);">0</span>個</p>
        
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
          <button class="btn" id="btn-stock-minus" style="width: auto; padding: 12px 24px; margin: 0; background-color: #757575;">- 1</button>
          <input type="number" id="stock-input" placeholder="在庫数" min="0" style="flex: 1; text-align: center; margin: 0;" />
        <button class="btn" id="btn-stock-plus" style="width: auto; padding: 12px 24px; margin: 0; background-color: #4caf50;">+ 1</button>
      </div>
      
      <button class="btn" id="btn-update-stock">在庫更新</button>
    </div>
  </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
