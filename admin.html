<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タピオカ注文 管理画面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ログイン画面 -->
  <div class="container" id="login-container" style="display: none; text-align:center; padding-top:50px; max-width: 400px;">
    <h2 style="margin-bottom:30px; color: var(--primary-color);">管理者ログイン</h2>
    <div class="form-group" style="text-align:left;">
      <label for="admin-email">メールアドレス</label>
      <input type="text" id="admin-email" placeholder="email@example.com">
    </div>
    <div class="form-group" style="text-align:left;">
      <label for="admin-password">パスワード</label>
      <input type="password" id="admin-password" placeholder="パスワード">
    </div>
    <button class="btn" id="btn-login" style="margin-top: 10px;">ログイン</button>
    <div id="login-error" class="error-msg" style="margin-top: 15px;"></div>
  </div>

  <!-- 管理画面 -->
  <div class="container" id="admin-container" style="display: none;">
    <div class="admin-header" style="position: relative; padding-bottom: 20px;">
      <h2>注文管理</h2>
      <button class="btn" id="btn-logout" style="position: absolute; right: 0; top: 0; width: auto; padding: 10px 20px; font-size: 1rem; margin-top: 0; background-color: #555;">ログアウト</button>
    </div>

    <!-- 読み込み中 -->
    <div id="loading" class="loading hidden">読み込み中...</div>
    
    <!-- 在庫表示と管理ボタン -->
    <div id="admin-stock" class="stock-indicator" style="font-weight: bold; margin-bottom: 1rem;">在庫: --</div>
    <div class="admin-controls" style="margin-bottom: 1rem;">
<button class="btn" id="reset-stock-btn">在庫を200にリセット</button>
  <input type="number" id="stock-input" min="0" placeholder="在庫数を入力" style="width: 80px; margin-left: 10px;" />
  <button class="btn" id="update-stock-btn">在庫更新</button>
  <button class="btn" id="decrement-stock-btn">在庫を-1減らす</button>
    </div>
    
    <!-- 注文一覧 -->
    <div class="admin-list" id="admin-list">
      <!-- 注文データがここに追加される -->
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
